<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% block stylesheet %}{% endblock %}
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
{% block body %}{% endblock %}
{% block script %}{% endblock %}
<div id="custom-chat-widget">
    <div id="chat-window" class="chat-window hidden">
        <div class="chat-header">
            <div class="user-info">
                <div class="status-dot"></div>
               <span>Assistant Levon</span>
            </div>
            <button id="close-chat">&times;</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="msg bot">
                Hi there! 👋 I'm Levon virtual assistant. How can I help you today?
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-msg" placeholder="Write a message..." autocomplete="off">
            <button id="send-msg">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
        <div class="chat-footer">Powered by Levon</div>
    </div>

    <button id="chat-trigger" class="chat-trigger">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"></path></svg>
    </button>
</div>
<script>document.addEventListener('DOMContentLoaded', () => {
    const windowChat = document.getElementById('chat-window');
    const input = document.getElementById('user-msg');
    const messagesContainer = document.getElementById('chat-messages');
    const sendBtn = document.getElementById('send-msg');
    const closeBtn = document.getElementById('close-chat');

    // 1. Обработка клика через делегирование (решает проблему "некликабельности")
    document.addEventListener('click', (e) => {
        const trigger = e.target.closest('#chat-trigger');
        if (trigger) {
            console.log("Клик по кнопке чата зафиксирован!");
            windowChat.classList.toggle('hidden');
        }
    });

    // 2. Закрытие чата
    if (closeBtn) {
        closeBtn.onclick = () => {
            windowChat.classList.add('hidden');
        };
    }

    // 3. Функция отправки сообщения
    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        // Сообщение пользователя
        const userMsg = document.createElement('div');
        userMsg.className = 'msg user';
        userMsg.textContent = text;
        messagesContainer.appendChild(userMsg);

        input.value = '';
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        // Ответ бота (через секунду)
        setTimeout(() => {
            const botMsg = document.createElement('div');
            botMsg.className = 'msg bot';
            botMsg.textContent = "Thanks! Levon will see your message soon.";
            messagesContainer.appendChild(botMsg);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 1000);
    }

    // 4. Слушатели для отправки
    if (sendBtn) {
        sendBtn.onclick = sendMessage;
    }

    if (input) {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    }
});</script>
<script>
document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function() {
        const currentActive = document.querySelector('.nav-link.active');
        if (currentActive) {
            currentActive.classList.remove('active');
        }

        this.classList.add('active');
    });
});
</script>
</body>
</html>
